<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição</title>

    <!--css principal-->
    <link rel="stylesheet" href="/css/inscricao.css">

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>    

    <!--JqueryUI-->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>





</head>
<body>
    

<div class="container-fluid">
    <div class="container text-white">
        <!-- multiform -->
        <form id="multiform">
            <h1>CADASTRO DE NADADORES</h1>
            <!-- progressbar -->
            <ul id="progressbar">
                <li class="active">Escolha a Equipe</li>
                <li>Dados do Nadador</li>
            </ul>
            <!-- fieldsets -->
            <fieldset>
                <h2 class="fs-title">Escolha a Equipe</h2>
                <input type="text" name="equipe" placeholder="Escolha a Equipe" />
                <input type="button" name="next" class="next action-button" value="Continuar" />
            </fieldset>
            <fieldset>
                <h2 class="fs-title">Dados do Nadador</h2>
                <input type="text" name="inome" placeholder="Nome" />
                <input type="number" name="icpf" placeholder="CPF (somente números)" />
                <input type="date" name="idtnasc" placeholder="Data de Nascimento" />
                <input type="text" name="ifone" placeholder="Telefone (Com ddd, somente números)" />
                <input type="button" name="previous" class="previous action-button" value="Voltar" />
                <a href="https://twitter.com/GoktepeAtakan" class="submit action-button" target="_top">Salvar
                    Nadador</a>
            </fieldset>
        </form>
    </div>
</div>

    <!--Bootstrap script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!--link js-->
    <script src="/js/inscricao.js"></script>

</body>
</html>
