<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Paulista de Natação - Administração</title>

    <!--css principal-->
    <link rel="stylesheet" href="/css/admin.css">

    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">


    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="/js/admin.js" defer></script>
</head>
<body>


<div class="row">
<!-- MENU LATERAL-->
    <div class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-4">Liga Paulista de Natação</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link active" aria-current="page">
                Usuários
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white">
                Permissões
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white">
                Alterar Senha
                </a>
            </li>
        </ul>
        <hr>
    </div>


    <!-- CONTEUDO -->
    <div class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
        <div class="row">
            <h2 class="text-white">ADICIONAR CONTEÚDO:</h2>
            <div class="col-md-6 col-lg-4">
                <div class="tile noticias">
                    <button class="btn">INSERIR NOTÍCIAS</button>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="tile eventos">
                    <button class="btn">EDITAR CALENDÁRIO DE EVENTOS</button>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="tile balizamento">
                    <button class="btn">BALIZAMENTO</button>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="tile configuracoes">
                    <a href="resultados.html">
                        <button class="btn">REGISTRAR RESULTADOS</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CONTEUDO -->
<div class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
    <div id="user-section">
        <h2 class="text-white">Usuários</h2>
        <table class="table table-striped table-hover">
            <thead>
              <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>E-Mail</th>
                <th>Perfis</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <!-- Linhas da tabela serão adicionadas dinamicamente aqui -->
            </tbody>
          </table>
          
        <button id="btnCadUsuario" class="btn btn-primary">Adicionar Novo Usuário</button>
 

        <!-- Formulário de cadastro de novo usuário -->
        <form id="frmCadUsuario" style="display: none;">
            <div class="mb-3">
                <fieldset id="cadUsuario">
                    <h2 class="fs-title text-white">Cadastro de usuário</h2>
                    <input type="text" name="nome" placeholder="Nome" required />
                    <input type="text" name="cpf" class="cpf form-control is-invalid" placeholder="CPF (somente números)"
                        required />
                    <input type="password" name="senha" placeholder="****" required />
                    <input type="text" name="fone" placeholder="Telefone (Com ddd, somente números)" required />
                    <input type="email" name="email" placeholder="E-mail" required />
                    <div id="perfis-container" class="form-check form-check-inline">
                        <h5>Selecione os perfis de acesso</h5>
                        <!-- Checkboxes dos perfis serão adicionados aqui dinamicamente -->
                    </div>
                    <input type="button" name="previous" class="previous action-button" value="Voltar" />
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </fieldset>
            </div>
        </form>
    </div>
</div>


    <!-- Botão de subir para o topo -->
    <a href="#" class="btn btn-primary position-fixed bottom-0 end-0 m-4" role="button" aria-label="Subir para o topo">
        <i class="fas fa-arrow-up"></i>
    </a>

    <!--Bootstrap script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
